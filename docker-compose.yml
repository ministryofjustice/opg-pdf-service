services:
  pdf-service:
    container_name: pdf-service
    image: 311462405659.dkr.ecr.eu-west-1.amazonaws.com/pdf-service:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - 3004:8000
    environment:
      PDF_SERVICE_PORT: 8000

  pdf-service-test:
    container_name: pdf-service-test
    image: pdf-service:test
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    depends_on:
      - pdf-service-test-static-server
    working_dir: /app
    volumes:
      - "./coverage:/app/coverage"
      - "./test-results:/app/test-results"
      - "~/.yarn-cache/v6/pdf-service:/usr/local/share/.cache/yarn/v6"

  pdf-service-test-static-server:
    container_name: static-server
    image: docker.io/nginx:latest@sha256:608a100c71651bf5b773c89083b4a1ad7ef4b2bd05d7a7e552271e03123692ad
    volumes:
      - "./src/baseline/remote_image.jpg:/usr/share/nginx/html/remote_image.jpg"
