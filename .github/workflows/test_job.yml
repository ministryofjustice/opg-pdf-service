on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test PDF Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
      - name: Dependencies from Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Run Javascript Linting
        run: |
          make lint-test

      - name: Run Unit Tests & Generate Coverage Report
        run: |
          mkdir -p /home/runner/project/build/service-pdf
          make unit-test-coverage

      - name: Upload Junit
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit
          path: |
            test-results/junit

      - name: Upload Image Diff Data
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: upload-image-diff
        with:
          name: image-diff
          path: |
            test-results/images

      - name: Upload Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            coverage

  verify-readonly-fs:
    name: Verify Read-only Filesystem
    runs-on: ubuntu-latest
    env:
      AWS_ROLE_ARN: ${{ github.ref_name == 'main' && 'arn:aws:iam::997462338508:role/sirius-component-ssm-role' || 'arn:aws:iam::679638075911:role/sirius-component-ssm-pr-role' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: opg-pdf-service-verify-readonly-fs
          aws-region: eu-west-1

      - name: Fetch ECS mounts config from SSM
        id: ssm
        run: |
          mounts_json=$(aws ssm get-parameter \
            --name "/sirius/production/ecs-mounts" \
            --region eu-west-1 \
            --query "Parameter.Value" \
            --output text)
          echo "mounts_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$mounts_json" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Verify docker-compose read_only/tmpfs matches infrastructure
        uses: ministryofjustice/opg-github-actions/actions/verify-readonly-fs@SP-3905
        with:
          mounts_json: ${{ steps.ssm.outputs.mounts_json }}
          service_json: |
            { "pdf-service": "pdf-service" }
